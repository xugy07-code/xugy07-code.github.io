title: "Guangyue Xu's Blog"
description: "Personal blog on machine learning, NLP, and tech."
url: "https://www.guangyue-xu.com"
baseurl: ""
author: "Guangyue Xu"
lang: "zh-CN"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

kramdown:
  math_engine: mathjax
  input: GFM

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Exclude from build
exclude:
  - docs-cn/
  - docs.sh
  - AGENTS.md
  - "*.draft.md"
