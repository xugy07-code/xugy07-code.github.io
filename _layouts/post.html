<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'zh-CN' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/stylesheet.css' | relative_url }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #333; }
    nav.site-nav {
      width: 100%; max-width: 800px; margin: 0 auto;
      padding: 12px 20px; border-bottom: 1px solid #eee;
      display: flex; gap: 24px; font-size: 15px;
    }
    nav.site-nav a { color: #333; text-decoration: none; font-weight: 500; }
    nav.site-nav a:hover, nav.site-nav a.active { color: #0070c0; }
    .post-container { max-width: 800px; margin: 0 auto; padding: 30px 20px; }
    .post-header h1 { font-size: 1.8em; margin-bottom: 6px; }
    .post-meta { color: #888; font-size: 0.9em; margin-bottom: 16px; display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }
    .post-content { line-height: 1.8; font-size: 1.02em; }
    .post-content h2 { margin-top: 2em; border-bottom: 1px solid #eee; padding-bottom: 4px; }
    .post-content h3 { margin-top: 1.5em; }
    .post-content pre { background: #f6f8fa; padding: 14px; border-radius: 6px; overflow-x: auto; }
    .post-content code { font-size: 0.9em; }
    .post-content blockquote { border-left: 4px solid #0070c0; margin: 0 0 1em 0; padding: 8px 16px; background: #f0f7ff; }
    .post-content table { border-collapse: collapse; width: 100%; margin: 1em 0; }
    .post-content th, .post-content td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
    .post-content th { background: #f6f8fa; font-weight: 600; }
    .back-link { display: inline-block; margin-top: 40px; color: #0070c0; text-decoration: none; font-size: 0.9em; }
    .back-link:hover { text-decoration: underline; }
    .tag-badge {
      display: inline-block; background: #e8f0fe; color: #1a73e8;
      border-radius: 12px; padding: 2px 10px; font-size: 0.8em;
    }
    /* ── 语言切换按钮 ── */
    .lang-switcher {
      display: flex; gap: 6px; margin-bottom: 24px;
    }
    .lang-btn {
      padding: 4px 14px; border-radius: 16px; border: 1px solid #ccc;
      background: #fff; color: #555; font-size: 0.85em; cursor: pointer;
      transition: all 0.15s;
    }
    .lang-btn.active {
      background: #0070c0; color: #fff; border-color: #0070c0;
    }
    /* 语言内容块：默认隐藏英文，显示中文 */
    .lang-block { display: none; }
    .lang-block.visible { display: block; }
  </style>
  <!-- KaTeX for math rendering -->
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false}
      ]
    });"></script>
</head>
<body>
  <nav class="site-nav">
    <a href="{{ '/' | relative_url }}">About</a>
    <a href="{{ '/blog/' | relative_url }}" class="active">Blog</a>
  </nav>
  <div class="post-container">
    <div class="post-header">
      <h1>{{ page.title }}</h1>
      <div class="post-meta">
        <span>{{ page.date | date: "%Y-%m-%d" }}</span>
        {% if page.tags %}
          {% for tag in page.tags %}
            <span class="tag-badge">{{ tag }}</span>
          {% endfor %}
        {% endif %}
      </div>
    </div>

    {% if page.bilingual %}
    <!-- 双语切换按钮，仅当 front matter 含 bilingual: true 时显示 -->
    <div class="lang-switcher">
      <button class="lang-btn active" onclick="switchLang('zh', this)">中文</button>
      <button class="lang-btn"        onclick="switchLang('en', this)">English</button>
    </div>
    {% endif %}

    <div class="post-content">
      {{ content }}
    </div>
    <a class="back-link" href="{{ '/blog/' | relative_url }}">← Back to Blog</a>
  </div>

  <script>
    // 初始化：如果页面有 .lang-block，默认显示 zh
    document.addEventListener('DOMContentLoaded', function () {
      var blocks = document.querySelectorAll('.lang-block');
      if (blocks.length > 0) {
        blocks.forEach(function (b) {
          if (b.dataset.lang === 'zh') b.classList.add('visible');
        });
      }
    });

    function switchLang(lang, btn) {
      // 切换内容块
      document.querySelectorAll('.lang-block').forEach(function (b) {
        b.classList.toggle('visible', b.dataset.lang === lang);
      });
      // 切换按钮高亮
      document.querySelectorAll('.lang-btn').forEach(function (b) {
        b.classList.remove('active');
      });
      btn.classList.add('active');
      // 重新触发 KaTeX 渲染（切换后新内容变为可见）
      if (window.renderMathInElement) {
        renderMathInElement(document.body, {
          delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false}
          ]
        });
      }
    }
  </script>
</body>
</html>
